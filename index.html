<style>body{
    background: linear-gradient(-45deg, rgb(97, 4, 97), rgb(98, 167, 167),rgb(134, 10, 143));

    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, Helvetica, sans-serif;
    color: #2e2c2c;
}
    
   
@keyframes gradientBG{
    0% { background-position: 0% 50%;}
    50%{background-position: 100% 50%;}
    100%{background-position: 0% 50%;}
}
          

.card{
    background: rgb(137, 144, 126);
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
}

.imgperfil{
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 5px solid blue;
    margin-bottom: 12px;
    object-fit: cover;
}

h2{margin: 10px 0 5px;
    font-size: 30px;
}

.local{
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 10px;
}

.job{ 
    font-size: 16px;
    line-height: 1.5;
}

.botoes{
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.btn{
    color: rgb(84, 38, 199);
    background-color: aliceblue;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 6px;
    border: 1px solid blue;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.btn:hover{
    opacity: 0.8;
    background: rgb(130, 130, 238);
}

.skills{
    margin-top: 20px;
    text-align: left;
}

.skills h3{
    font-size: 20px;
    margin-bottom: 10px;
}

.tags{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.tag{
    border: 1px solid aliceblue;
    padding: 5px 10px;
    border-radius: 4px;
}

.social-midia{
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 20px;
}

.social-midia i{
    cursor: pointer;
    transition: 0.3s;
}

.social-midia i:hover{
    color: rgb(53, 189, 157);
    transform: scale(1.2);
}

</style>
